name: Build Portable

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build all portable packages
        run: python build/build_portable.py

      - uses: actions/upload-artifact@v4
        with:
          name: portable-packages
          path: |
            browser-cookies-portable-*.zip
            browser-cookies-portable-*.tar.gz

  test-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-packages

      - name: Test portable package
        shell: bash
        run: |
          7z x browser-cookies-portable-win64.zip
          cd browser-cookies-portable-win64
          python/python.exe -m browser_cookies_cli --help
          python/python.exe -c "from browser_cookies_cli import detect_browsers; print('Import OK:', list(detect_browsers()))"

  test-linux:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-packages

      - name: Test portable package
        run: |
          tar xzf browser-cookies-portable-linux-x64.tar.gz
          cd browser-cookies-portable-linux-x64
          chmod +x export.sh import.sh
          bash -c 'PYTHONPATH="$(pwd)/lib" python3 -c "from browser_cookies_cli import detect_browsers; print(\"Import OK:\", list(detect_browsers()))"'

  test-macos:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portable-packages

      - name: Test portable package (ARM)
        run: |
          tar xzf browser-cookies-portable-macos-arm64.tar.gz
          cd browser-cookies-portable-macos-arm64
          chmod +x export.sh import.sh
          bash -c 'PYTHONPATH="$(pwd)/lib" python3 -c "from browser_cookies_cli import detect_browsers; print(\"Import OK:\", list(detect_browsers()))"'
